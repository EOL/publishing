  about:
    trait_bank:
      body_html: <p>O equipo técnico e de xestión de datos da EOL refírese aos recursos
        de datos estruturados na EOL (datos de trazos e outros atributos, interaccións
        ecolóxicas e a nosa clasificación nativa, a «Xerarquía de traballo dinámico»),
        que en conxunto se denominan «TraitBank». Este contido xestiónase de forma
        algo diferente ao noso contido «clásico» (imaxes, vídeo, son e texto descritivo)
        e é útil para diferentes cousas.</p><p>TraitBank é máis novo que o resto da
        EOL; foi concibido orixinalmente pola directora do grupo de páxinas de especies,
        Cynthia Parr, e entrou en funcionamento na versión 2 da EOL en xaneiro de
        2014. Desde entón, os datos estruturados foron a nosa máxima prioridade para
        o desenvolvemento de contidos.</p><p>Agora podes <a href='%{example_search_path}'>buscar</a>
        ou explorar a EOL por datos estruturados, descargalo ou podes atopalo na nosa
        nova lapela de vista xeral en forma de <a href='%{autogen_page_path}'>texto
        xerado automaticamente</a>. Do mesmo xeito que o resto do contido da EOL,
        está dispoñible para a súa reutilización e inclúe datos de recoñecemento detallados
        para que poidas atribuílo se o usas na túa propia obra.</p><p>Estes datos
        están modelados como un <a href='%{property_graph_url}'>gráfico de propiedades</a>
        en <a href='%{neo4j_url}'>neo4j</a>. Hai dispoñibles <a href='%{data_services_path}'>servizos
        de datos</a>.</p>
