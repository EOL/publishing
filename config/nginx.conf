# NOTE: yes, root. This is a docker container, permissions are secondary.
user root root;

# You should probably keep this (maximum number of open files per worker process) in sync with worker_connections
worker_rlimit_nofile 16384;
events {
  worker_connections 16384;
}

http {
  include mime.types;
  default_type application/octet-stream;

  # Basic Settings
  sendfile on;
  sendfile_max_chunk 10m;
  tcp_nopush on;
  tcp_nodelay on;
  types_hash_max_size 4096;

  upstream rails_app {
    server docker-app-1:3000;
    server docker-app-2:3000;
    server docker-app-3:3000;
    server docker-app-4:3000;
    server docker-app-5:3000;
    server docker-app-6:3000;
    server docker-app-7:3000;
    server docker-app-8:3000;
    keepalive 32;
  }

  map $status $loggable {
    default 1;
    "~^[23]" 0;
  }

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  '$upstream_cache_status';

  access_log /var/log/nginx/access.log main buffer=1m if=$loggable;
  error_log /var/log/nginx/error.log;

  # Files can be quite large:
  client_max_body_size 256M;
  proxy_max_temp_file_size 0;

  # We're going to store static pages where possible:
  proxy_buffering on;

  # SSL Settings
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2; # Dropping SSLv3, ref: POODLE
  ssl_prefer_server_ciphers on;

  proxy_temp_path /dev/shm/nginx_tmp;
  proxy_cache_path /app/cache levels=1:2:2 keys_zone=STATIC_CACHE:640m max_size=99g inactive=360d use_temp_path=off;

  server {
    listen 80;
    server_name localhost;
    keepalive_timeout 90;
    # Default root:
    root /usr/share/nginx/html;

    rewrite "^/[a-z]{2}(-[a-z]{2,3})?/(.*)$" /$2 last;

    # DATA FILES:
    location ~ ^/data/ {
      root /app/public;
      gzip_static on;
      expires max;
      add_header Cache-Control public;
      try_files $uri =404;
      error_page 404 /404.html;
    }

    # OTHER PAGES ON THE SITE:
    location ^~ /users/ {
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Frame-Options ALLOWALL; # We have a partner that requires this, we cannot change this
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Host $host;

      # User pages should not be served from the long-lived proxy cache.
      proxy_no_cache 1;
      proxy_cache_bypass 1;
      add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;

      proxy_buffering on;
      proxy_pass http://rails_app;

      proxy_connect_timeout 300;
      proxy_send_timeout 300;
      proxy_read_timeout 300;
      send_timeout 300;
    }

    location / {
      # proxy_pass http://app:3000;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Frame-Options ALLOWALL; # We have a partner that requires this, we cannot change this
      proxy_set_header Cookie $http_cookie;
      proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
      proxy_hide_header Set-Cookie;
      # proxy_pass_header Set-Cookie;
      proxy_set_header Host $host;

      proxy_cache STATIC_CACHE;
      proxy_cache_valid 200 301 302 365d;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

      proxy_buffering on;
      proxy_pass http://rails_app;

      proxy_connect_timeout 300;
      proxy_send_timeout 300;
      proxy_read_timeout 300;
      send_timeout 300;
    }

    location ~ ^/(assets|packs)/ {
      gzip_static on;
      expires max;
      add_header Cache-Control public;
      try_files $uri =404;
      error_page 404 /404.html;
    }

    # STATIC IMAGES AND FILES:
    location ~ ^(?!/rails/)(?!/robots\.txt$).+\.(jpg|jpeg|gif|png|ico|txt|zip|gz|tgz)$ {
      gzip_static on;
      expires max;
      add_header Cache-Control public;
      try_files $uri =404;
      error_page 404 /404.html;
    }
  }
}
